<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billease Deliverability Report</title>
  <style>
    :root { --blue:#155eef; --bg:#f5f7fb; --card:#fff; --text:#172033; --muted:#667085; --border:#e4e7ec; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; background:var(--bg); color:var(--text); }
    header { background:linear-gradient(135deg,#123b91,#1677ff); color:#fff; padding:32px 40px; }
    header h1 { margin:0 0 8px; font-size:28px; }
    header p { margin:0; opacity:.9; }
    main { padding:28px 40px; max-width:1400px; margin:auto; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:20px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; box-shadow:0 1px 3px rgba(16,24,40,.06); }
    .label { font-size:13px; color:var(--muted); margin-bottom:8px; }
    .value { font-size:26px; font-weight:700; }
    .toolbar { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin:18px 0; }
    input, select { padding:10px 12px; border:1px solid var(--border); border-radius:10px; background:#fff; min-width:220px; }
    .table-wrap { background:#fff; border:1px solid var(--border); border-radius:16px; overflow:auto; box-shadow:0 1px 3px rgba(16,24,40,.06); }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { padding:12px 14px; border-bottom:1px solid var(--border); text-align:left; white-space:nowrap; }
    th { background:#f8fafc; position:sticky; top:0; z-index:1; font-weight:700; }
    tr:hover td { background:#f9fbff; }
    .status { margin:14px 0; color:var(--muted); }
    .tabs { display:flex; gap:8px; flex-wrap:wrap; margin:18px 0; }
    .tab { border:1px solid var(--border); background:#fff; border-radius:999px; padding:9px 14px; cursor:pointer; }
    .tab.active { background:var(--blue); color:#fff; border-color:var(--blue); }
    footer { color:var(--muted); font-size:12px; padding:20px 40px 32px; max-width:1400px; margin:auto; }
  </style>
</head>
<body>
  <header>
    <h1>Billease Deliverability Report</h1>
    <p>Live report connected to Google Sheets</p>
  </header>

  <main>
    <div class="cards" id="cards"></div>

    <div class="toolbar">
      <input id="search" placeholder="Search campaign, channel, date..." />
      <select id="categoryFilter"><option value="">All categories</option></select>
      <select id="channelFilter"><option value="">All channels</option></select>
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="status" id="status">Loading data...</div>
    <div class="table-wrap"><table id="reportTable"></table></div>
  </main>

  <footer>
    Data source: Google Sheets published CSV. Update the sheet and this report will refresh automatically.
  </footer>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSRR37cSPX3g8O-Vmm6VqkvpdnyLL5gVU4tP66oj-cxvNrfww6NEqDzoX070qle6w/pub?gid=2043204496&single=true&output=csv';
let rows = [], headers = [], activeTab = 'All';

function parseCSV(text) {
  const result = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i + 1];
    if (c === '"' && inQuotes && n === '"') { field += '"'; i++; }
    else if (c === '"') inQuotes = !inQuotes;
    else if (c === ',' && !inQuotes) { row.push(field); field = ''; }
    else if ((c === '\n' || c === '\r') && !inQuotes) {
      if (field || row.length) { row.push(field); result.push(row); row = []; field = ''; }
      if (c === '\r' && n === '\n') i++;
    } else field += c;
  }
  if (field || row.length) { row.push(field); result.push(row); }
  return result.filter(r => r.some(cell => String(cell).trim() !== ''));
}
function normalize(s){ return String(s||'').trim(); }
function findHeader(possible){ return headers.find(h => possible.some(p => h.toLowerCase().includes(p))); }
function num(v){ const n = Number(String(v||'').replace(/[^0-9.-]/g,'')); return isNaN(n)?0:n; }
function fmt(n){ return Number(n||0).toLocaleString(); }

function buildCards(data) {
  const enteredH = findHeader(['entered']);
  const sentH = findHeader(['sent']);
  const deliveredH = findHeader(['delivered']);
  const campaignH = findHeader(['campaign']);
  const totals = [
    ['Campaigns', new Set(data.map(r => r[campaignH] || JSON.stringify(r))).size],
    ['Entered', data.reduce((a,r)=>a+num(r[enteredH]),0)],
    ['Sent', data.reduce((a,r)=>a+num(r[sentH]),0)],
    ['Delivered', data.reduce((a,r)=>a+num(r[deliveredH]),0)]
  ];
  document.getElementById('cards').innerHTML = totals.map(([l,v]) => `<div class="card"><div class="label">${l}</div><div class="value">${fmt(v)}</div></div>`).join('');
}

function populateFilters() {
  const categoryH = findHeader(['category','campaign type','lifecycle']);
  const channelH = findHeader(['channel']);
  const catSel = document.getElementById('categoryFilter');
  const chSel = document.getElementById('channelFilter');
  if (categoryH) [...new Set(rows.map(r => normalize(r[categoryH])).filter(Boolean))].sort().forEach(v => catSel.innerHTML += `<option>${v}</option>`);
  if (channelH) [...new Set(rows.map(r => normalize(r[channelH])).filter(Boolean))].sort().forEach(v => chSel.innerHTML += `<option>${v}</option>`);
}

function buildTabs() {
  const categoryH = findHeader(['category','campaign type','lifecycle']);
  const tabs = ['All'];
  if (categoryH) tabs.push(...[...new Set(rows.map(r => normalize(r[categoryH])).filter(Boolean))].sort());
  document.getElementById('tabs').innerHTML = tabs.map(t => `<button class="tab ${t===activeTab?'active':''}" onclick="activeTab='${t.replace(/'/g,"\\'")}'; render();">${t}</button>`).join('');
}

function filteredRows() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('categoryFilter').value;
  const ch = document.getElementById('channelFilter').value;
  const categoryH = findHeader(['category','campaign type','lifecycle']);
  const channelH = findHeader(['channel']);
  return rows.filter(r => {
    const text = headers.map(h => r[h]).join(' ').toLowerCase();
    return (!q || text.includes(q)) && (!cat || r[categoryH] === cat) && (!ch || r[channelH] === ch) && (activeTab === 'All' || !categoryH || r[categoryH] === activeTab);
  });
}

function render() {
  buildTabs();
  const data = filteredRows();
  buildCards(data);
  const table = document.getElementById('reportTable');
  document.getElementById('status').textContent = `${data.length} rows shown`;
  table.innerHTML = `<thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>` +
    data.map(r => `<tr>${headers.map(h=>`<td>${r[h] ?? ''}</td>`).join('')}</tr>`).join('') + '</tbody>';
}

async function init() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('Could not load Google Sheet CSV');
    const csv = await res.text();
    const parsed = parseCSV(csv);
    headers = parsed[0].map(h => normalize(h));
    rows = parsed.slice(1).map(r => Object.fromEntries(headers.map((h,i)=>[h, normalize(r[i])])));
    populateFilters();
    document.getElementById('search').addEventListener('input', render);
    document.getElementById('categoryFilter').addEventListener('change', render);
    document.getElementById('channelFilter').addEventListener('change', render);
    render();
  } catch (e) {
    document.getElementById('status').textContent = 'Error loading data. Please check if the Google Sheet is published as CSV and publicly accessible.';
    console.error(e);
  }
}
init();
</script>
</body>
</html>
